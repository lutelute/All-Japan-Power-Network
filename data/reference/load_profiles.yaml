# 日負荷曲線 + 年間トレンド（サンプルデータ）
# Source: OCCTO統計データ・一般的な日本の負荷パターンに基づくサンプル
# 今後、実績データに差し替え予定
#
# 全値は正規化済み（ピーク = 1.0）
# 実際の負荷 = base_case_load × daily_curve[hour] × monthly_factor[month]

# ── 日負荷曲線（24時間値、0時〜23時）──
# 平日パターン: 昼間ピーク型（夏季想定）
daily_curves:
  weekday:
    - 0.55   # 00:00
    - 0.50   # 01:00
    - 0.48   # 02:00
    - 0.47   # 03:00
    - 0.47   # 04:00
    - 0.50   # 05:00
    - 0.55   # 06:00
    - 0.65   # 07:00
    - 0.78   # 08:00
    - 0.88   # 09:00
    - 0.93   # 10:00
    - 0.95   # 11:00
    - 0.92   # 12:00  昼休み
    - 0.95   # 13:00
    - 1.00   # 14:00  ← ピーク（夏季午後）
    - 0.98   # 15:00
    - 0.95   # 16:00
    - 0.90   # 17:00
    - 0.88   # 18:00
    - 0.85   # 19:00
    - 0.80   # 20:00
    - 0.73   # 21:00
    - 0.65   # 22:00
    - 0.58   # 23:00

  # 休日パターン: ピーク低め、立ち上がり遅い
  weekend:
    - 0.50   # 00:00
    - 0.47   # 01:00
    - 0.45   # 02:00
    - 0.44   # 03:00
    - 0.44   # 04:00
    - 0.46   # 05:00
    - 0.48   # 06:00
    - 0.55   # 07:00
    - 0.65   # 08:00
    - 0.75   # 09:00
    - 0.82   # 10:00
    - 0.85   # 11:00
    - 0.83   # 12:00
    - 0.85   # 13:00
    - 0.88   # 14:00  ← 休日ピーク
    - 0.87   # 15:00
    - 0.85   # 16:00
    - 0.82   # 17:00
    - 0.80   # 18:00
    - 0.78   # 19:00
    - 0.73   # 20:00
    - 0.65   # 21:00
    - 0.58   # 22:00
    - 0.53   # 23:00

# ── 年間トレンド（月別係数）──
# 8月をピーク（1.0）として正規化
monthly_factors:
  1: 0.85    # 1月（冬季暖房需要）
  2: 0.83    # 2月
  3: 0.78    # 3月（端境期）
  4: 0.72    # 4月
  5: 0.70    # 5月（最低需要期）
  6: 0.80    # 6月（梅雨・冷房開始）
  7: 0.95    # 7月（盛夏）
  8: 1.00    # 8月 ← 年間ピーク
  9: 0.90    # 9月（残暑）
  10: 0.75   # 10月（秋季）
  11: 0.73   # 11月
  12: 0.82   # 12月（冬季暖房開始）

# ── 基準点 ──
# ベースケース（alljapan.mat）の負荷値が対応する時点
reference:
  month: 8           # 8月
  hour: 14           # 14時
  day_type: weekday  # 平日

# ── 年成長率（将来予測用）──
annual_growth_rate: 0.005   # 年0.5%増
base_year: 2024
