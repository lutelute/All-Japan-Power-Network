# Japan Power Grid - Voltage Hierarchy by Region
# Per OCCTO (電力広域的運営推進機関) wide-area grid long-term policy
#
# The top 2 voltage levels in each region constitute the
# "広域連系系統 地内基幹送電線" (wide-area interconnection backbone).
# These are the backbone lines covered by the OSM power grid data.
#
# Classification:
#   level_1 - Highest voltage in the region (typically 500kV)
#   level_2 - Second highest voltage (varies by region)
#   lower   - Lower voltage levels (regional supply / sub-transmission)
#
# Grid class mapping:
#   backbone        - Level 1 and Level 2 (地内基幹送電線)
#   regional        - Lower levels used for regional supply
#   sub_transmission - Lowest levels connecting to distribution substations
#
# Source: OCCTO 広域系統長期方針 (Wide-area Grid Long-term Policy)

hokkaido:
  region_ja: "北海道"
  region_en: "Hokkaido"
  frequency_hz: 50
  level_1:
    voltage_kv: 275
    grid_class: "backbone"
    description: "Hokkaido backbone (北海道基幹系統)"
  level_2:
    voltage_kv: 187
    grid_class: "backbone"
    description: "Hokkaido secondary backbone"
  lower:
    - voltage_kv: 66
      grid_class: "sub_transmission"
      description: "Sub-transmission to distribution substations"
  notes: "Hokkaido has no 500kV lines. 275kV is the highest voltage level."

