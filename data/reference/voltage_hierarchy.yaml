    grid_class: "backbone"
    description: "Tohoku secondary backbone"
  lower:
    - voltage_kv: 154
      grid_class: "regional"
      description: "Regional supply lines"
    - voltage_kv: 66
      grid_class: "sub_transmission"
      description: "Sub-transmission"

