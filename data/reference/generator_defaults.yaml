# Generator Default Parameters by Fuel Type
# 燃料種別ごとの発電機デフォルトパラメータ
#
# Sources:
#   - 電力広域的運営推進機関 (OCCTO) 供給計画
#   - 資源エネルギー庁 発電コスト検証委員会 (2021)
#   - 各電力会社 有価証券報告書
#   - IEEE/IEE Japan 標準パラメータ
#
# Units:
#   capacity_mw: MW (reference typical unit size)
#   p_min_fraction: fraction of capacity_mw (0-1)
#   ramp_up_fraction: fraction of capacity_mw per hour
#   ramp_down_fraction: fraction of capacity_mw per hour
#   min_up_time_h: hours
#   min_down_time_h: hours
#   startup_time_h: hours (cold start to sync)
#   shutdown_time_h: hours (desync to fully off)
#   startup_cost_per_mw: JPY per MW of capacity
#   shutdown_cost_per_mw: JPY per MW of capacity
#   fuel_cost_per_mwh: JPY/MWh (variable cost including fuel + variable O&M)
#   no_load_cost_per_mw: JPY/MW/h (fixed cost while committed)
#   labor_cost_per_h: JPY/h (staffing cost per unit)
#   heat_rate_kj_per_kwh: kJ/kWh (thermal efficiency indicator)
#   co2_intensity_kg_per_mwh: kg-CO2/MWh
#   typical_lifetime_years: years
#   typical_construction_years: years (construction period)
#   planned_outage_rate: fraction (0-1), annual planned outage rate
#   forced_outage_rate: fraction (0-1), annual forced outage rate
#   capacity_factor: fraction (0-1), typical annual capacity factor

fuel_types:

  coal:
    name_ja: 石炭火力
    name_en: Coal Thermal
    category: thermal
    dispatchable: true
    typical_unit_mw: 600
    p_min_fraction: 0.30
    ramp_up_fraction: 0.02        # ~2%/h of capacity (slow)
    ramp_down_fraction: 0.02
    min_up_time_h: 8
    min_down_time_h: 8
    startup_time_h: 12            # cold start: 12h typical
    shutdown_time_h: 6
    startup_cost_per_mw: 15       # 15 JPY/MW -> 9000 JPY for 600MW
    shutdown_cost_per_mw: 5
    fuel_cost_per_mwh: 4500
    no_load_cost_per_mw: 1.0
    labor_cost_per_h: 2000
    heat_rate_kj_per_kwh: 9200
    co2_intensity_kg_per_mwh: 864
    typical_lifetime_years: 40
    typical_construction_years: 5
    planned_outage_rate: 0.06
    forced_outage_rate: 0.04
    capacity_factor: 0.70

  lng:
