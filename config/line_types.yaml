# Japan Power Grid - Transmission Line Type Parameters
# Typical electrical parameters for Japanese transmission lines (per km)
#
# These are standard reference values used as defaults when exact
# line-specific parameters are unavailable from the source data.
#
# Parameters:
#   r_ohm_per_km  - Resistance (Ohm/km)
#   x_ohm_per_km  - Reactance (Ohm/km)
#   b_s_per_km    - Susceptance (Siemens/km) — engineering convention
#   max_i_ka      - Maximum current rating (kA)
#   conductor     - Typical conductor specification
#
# IMPORTANT: pandapower uses c_nf_per_km (capacitance in nF/km), NOT b_s_per_km.
# Conversion: c_nf_per_km = b_s_per_km / (2 * pi * f_hz) * 1e9
# This conversion is frequency-dependent (50 Hz east / 60 Hz west Japan)
# and must be performed at runtime by src/converter/line_parameters.py.
#
# Source: Standard Japanese transmission line reference values
# (OCCTO wide-area grid planning documents, TEPCO/KEPCO design standards)

# Top-level keys are voltage classes in kV
# Access: line_types[500], line_types[275], etc.

500:
  description: "500kV extra-high voltage backbone"
  description_ja: "500kV 超高圧基幹送電線"
  r_ohm_per_km: 0.012
  x_ohm_per_km: 0.290
  b_s_per_km: 4.1e-6
  max_i_ka: 4.0
  conductor: "ACSR 810mm2 x 4"
  conductor_ja: "ACSR 810mm2 4導体"
  circuits: 2
  grid_class: "backbone"
  kml_style: "extra_thick"
  notes: "Main inter-regional backbone lines (基幹系統). Quad-bundle conductors."

275:
  description: "275kV high voltage trunk"
