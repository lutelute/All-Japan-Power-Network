# National backbone (covers inter-regional transmission lines)
national_backbone:
  name_en: "National Backbone"
  name_ja: "全国基幹系統"
  frequency_hz: null  # Mixed: contains both 50 Hz and 60 Hz sections
  notes: "Covers inter-regional 500kV backbone and major interconnection lines"

# Frequency boundary definition
frequency_boundary:
  description: "The 50/60 Hz boundary runs through central Japan"
  east_50hz:
    - "hokkaido"
    - "tohoku"
    - "tokyo"
  west_60hz:
    - "chubu"
    - "hokuriku"
    - "kansai"
    - "chugoku"
    - "shikoku"
    - "kyushu"
    - "okinawa"
  frequency_converter_stations:
    - name: "新信濃変換所"
      name_en: "Shin-Shinano Converter"
      from_region: "tokyo"
      to_region: "chubu"
      capacity_mw: 600
      type: "frequency_converter"
    - name: "佐久間周波数変換所"
      name_en: "Sakuma Frequency Converter"
      from_region: "tokyo"
      to_region: "chubu"
      capacity_mw: 300
      type: "frequency_converter"
    - name: "東清水変換所"
      name_en: "Higashi-Shimizu Converter"
      from_region: "tokyo"
      to_region: "chubu"
      capacity_mw: 300
      type: "frequency_converter"

# Japan overall bounding box (for coordinate validation)
japan_bounding_box:
  lat_min: 24.0
  lat_max: 46.0
  lon_min: 122.0
  lon_max: 154.0
