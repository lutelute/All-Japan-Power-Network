# Japan Power Grid - Region Configuration
# Defines all 10 regional grids + national backbone
# Data source: OpenStreetMap (power=substation, power=line)

# Frequency zones
# 50 Hz: Hokkaido, Tohoku, Tokyo (eastern Japan)
# 60 Hz: Chubu, Hokuriku, Kansai, Chugoku, Shikoku, Kyushu, Okinawa (western Japan)
# Note: Chubu is geographically in central Japan but operates at 60 Hz
# The 50/60 Hz boundary runs through Niigata and Shizuoka prefectures

regions:
  hokkaido:
    name_en: "Hokkaido"
    name_ja: "北海道"
    frequency_hz: 50
    utility: "北海道電力"
    utility_en: "Hokkaido Electric Power"
    voltage_levels:
      level_1_kv: 275
      level_2_kv: 187
      lower_kv: [66]
    bounding_box:
      lat_min: 41.3
      lat_max: 45.6
      lon_min: 139.3
      lon_max: 145.8
    status: "active"

  tohoku:
